<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>clothes.com</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/css/style.css">
    <script type="module" src="/js/app.js"></script>
</head>

<body>
    <header>
        <div class="header-inner">
            <div class="header-group-left">
                <img class="logo" id="logo" src="/images/logo.png">
                <nav class="navegation">
                    <ul>
                        <li id="categories-menu">
                            <a id="categories-button" href="/">
                            Categories
                            <img src="/images/arrow_drop_down.svg">
                            </a>
                            <ul id="categories-dropdown">
                        </li>
                    </ul>
                </nav>
            </div>
            <div class="header-group-right">
                <nav class="navegation">
                    <ul>
                        <li><a id="nav-login-button" href="/">Login</a></li>
                        <li><a id="orders-button" href="/">Orders</a></li>
                    </ul>
                </nav>

                <img class="cart-icon" id="shopping-cart" src="/images/shopping_cart_icon.svg">

                <form class="searchbox" action="#" method="get">
                    <input type="search" id="searchInput" placeholder="Search...">
                    <button id="searchButton" type="submit">
                        <img class="search-icon" src="/images/search_icon.svg">
                    </button>
                </form>
            </div>
        </div>
    </header>
    <main>
        <div class="container" id="container"></div>
    </main>

</body>

</html>


<!-- Template Create Account Page -->
<template id="template-create-account">
    <div class="form-background">
        <h1 class="form-title">Sign Up</h1>
        <div class="alert"></div>

        <form id="form-create-account" novalidate>
            <label>Name</label>
            <input type="text" id="name" name="name" minlength="3" maxlength="80" required>

            <label>CPF</label>
            <input type="text" id="cpf" name="cpf" minlength="11" maxlength="11" required>

            <label>Email</label>
            <input type="email" id="email" name="email" autocomplete="email" maxlength="35" required>

            <label>Phone</label>
            <input type="text" id="phone" name="phone" minlength="11" maxlength="11" required>

            <label>Password</label>
            <input type="password" id="password" name="password" autocomplete="new-password" name="password"
                minlength="8" required>

            <label>Confirm your password</label>
            <input type="password" id="confPassword" name="confPassword" autocomplete="new-password" required>

            <input type="submit" class="large-green-button" value="Sign Up">
        </form>
    </div>
</template>

<!-- Template Login Page -->
<template id="template-login">
    <div class="form-background">
        <h1 class="form-title">Login</h1>
        <div class="alert"></div>
        <form class="login-form" novalidate>
            <label>E-mail</label>
            <input type="email" id="email" name="email">
            <label>Password</label>
            <input type="password" id="password" name="password" required>
            <input type="submit" class="large-blue-button" id="login-button" value="Login">
        </form>
        <input type="button" id="create-account-button" class="large-green-button" value="Sign Up">
    </div>
</template>

<!-- Template Admin Menu -->
<template id="template-admin">
    <h1 class="form-title">Admin Menu</h1>
    <button class="large-white-button" id="products">Products</button>
    <button class="large-white-button" id="categories">Categories</button>
    <button class="large-white-button" id="orders">Orders</button>
    <button class="large-white-button" id="users">Users</button>
</template>

<!-- TEMPLATES PRODUCTS -->

<!-- Products Menu -->
<template id="template-product-menu">
    <div>
        <h1 class="form-title">Products</h1>
    </div>
    <div class="form-background">
        <a href="/admin/products/create">Create new Product</a>
        <table id="product-table">
        </table>
    </div>
</template>

<!-- Products Create -->
<template id="template-create-product">
    <div class="form-background">
        <h1 class="form-title">Create Product</h1>
        <div class="alert"></div>
        <form class="products-form" novalidate>
            <label>Name</label>
            <input type="text" id="name-create-product" name="name" minlength="3" maxlength="80" required>

            <label>Price</label>
            <input type="number" id="price-create-product" name="price" min="0" step="0.01" required>

            <label>Description</label>
            <input type="text" id="description-create-product" name="description" maxlength="255" required>

            <label for="size">Size</label>
            <select name="size" id="size-select-create-product" required>
                <option value="">Please choose an option</option>
                <option value="SMALL">Small</option>
                <option value="MEDIUM">Medium</option>
                <option value="LARGE">Large</option>
            </select>

            <label for="color">Color</label>
            <select name="color" id="color-select-create-product" required>
                <option value="">Please choose an option</option>
                <option value="RED">Red</option>
                <option value="YELLOW">Yellow</option>
                <option value="BLUE">Blue</option>
                <option value="GREEN">Green</option>
                <option value="ORANGE">Orange</option>
                <option value="PURPLE">Purple</option>
                <option value="WHITE">White</option>
                <option value="BLACK">Black</option>
                <option value="GREY">Grey</option>
                <option value="BEIGE">Beige</option>
                <option value="BROWN">Brown</option>
            </select>

            <label for="category">Category</label>
            <select name="category" class="category-select" required>
                <option value="">Please choose an option</option>
            </select>

            <label>Image</label>
            <input type="file" id="image" class="input-file" accept="image/png" required>

            <input type="submit" id="create-product-button" class="large-blue-button" value="Create a product">
        </form>
    </div>
</template>

<!-- Products Update -->
<template id="template-update-product">
    <div class="form-background">
        <h1 class="form-title">Update Product</h1>
        <div class="alert"></div>
        <form class="products-form" novalidate>
            <label>Name</label>
            <input type="text" id="name-update-product" name="name" minlength="3" maxlength="80" required>

            <label>Price</label>
            <input type="number" id="price-update-product" name="price" min="0" step="0.01" required>

            <label>Description</label>
            <input type="text" id="description-update-product" name="description" maxlength="255" required>

            <label for="size">Size</label>
            <select name="size" id="size-select-update-product" required>
                <option value="">Please choose an option</option>
                <option value="SMALL">Small</option>
                <option value="MEDIUM">Medium</option>
                <option value="LARGE">Large</option>
            </select>

            <label for="color">Color</label>
            <select name="color" id="color-select-update-product" required>
                <option value="">Please choose an option</option>
                <option value="RED">Red</option>
                <option value="YELLOW">Yellow</option>
                <option value="BLUE">Blue</option>
                <option value="GREEN">Green</option>
                <option value="ORANGE">Orange</option>
                <option value="PURPLE">Purple</option>
                <option value="WHITE">White</option>
                <option value="BLACK">Black</option>
                <option value="GREY">Grey</option>
                <option value="BEIGE">Beige</option>
                <option value="BROWN">Brown</option>
            </select>

            <label for="category">Category</label>
            <select name="category" class="category-select" required>
                <option value="">Please choose an option</option>
            </select>

            <label>Image</label>
            <input type="file" id="image" class="input-file" accept="image/png" required>
            <label>Current Image</label>
            <img id="image-preview">
            <input type="submit" id="update-product-button" class="large-blue-button" value="Update product">
        </form>
    </div>
</template>

<!-- Products Delete -->
<template id="template-delete-product">
    <div class="form-background">
        <h1 class="form-title">Delete a product</h1>
        <div class="alert"></div>
        <label id="current-product-title">Do you really want to delete the product below?</label>
        <label id="current-product-name" style="color: red"></label>
        <button class="delete-option-button" id="delete-product">Delete</button>
    </div>
</template>

<!-- TEMPLATES ORDERS -->

<!-- Orders Menu -->
<template id="template-orders-menu">
    <div>
        <h1 class="form-title">Orders</h1>
    </div>
    <div class="form-background">
        <a href="/admin/orders/create">Create new Order</a>
        <table id="orders-table">
        </table>
    </div>
</template>

<!-- Orders Create -->
<template id="template-create-order">
    <div class="form-background">
        <h1 class="form-title">Create a new Order</h1>
        <div class="alert"></div>
        <form id="form-create-order" novalidate>

            <label>User Id</label>
            <input class="renderUserData-input" type="text" id="client-id-create-order" name="userId" required>
            <button class="large-blue-button" id="find-user-by-id">Find</button>

            <div class="renderUserData-display" id="client-data-create-order"></div>

            <label>Type product name to find</label>
            <input type="text" class="renderProductSearch-input" id="find-product-create-order" required>
            <div class="flex-column">
                <button class="large-blue-button" id="find-product-by-name">Find</button>
                <button class="large-red-button" id="clear-search-product">Clear Search</button>
            </div>

            <div class="product-found"></div>
            <label>Selected Items</label>
            <div class="product-added"></div>

            <label>Order Status</label>
            <select name="orderStatus" id="order-status-select" required>
                <option value="">Please choose an option</option>
                <option value="WAITING_PAYMENT">WAITING_PAYMENT</option>
                <option value="PAID">PAID</option>
                <option value="SHIPPED">SHIPPED</option>
                <option value="DELIVERED">DELIVERED</option>
                <option value="CANCELLED">CANCELLED</option>
            </select>

            <input type="submit" id="create-admin-order-button" class="large-blue-button" value="Create a order">
        </form>
    </div>
</template>

<!-- Orders Update -->
<template id="template-update-order">
    <div class="form-background">
        <h1 class="form-title">Update Order</h1>
        <div class="alert"></div>
        <form id="form-update-order" novalidate>

            <label>User Id</label>
            <input class="renderUserData-input" type="text" id="client-id-update-order" name="userId" required>
            <button class="large-blue-button" id="find-user-by-id-update-order">Find</button>

            <div class="renderUserData-display" id="client-data-update-order"></div>

            <label>Type product name to find</label>
            <input type="text" class="renderProductSearch-input" id="find-product-update-order" required>
            <div class="flex-column">
                <button class="large-blue-button" id="find-product-by-name-update-order">Find</button>
                <button class="large-red-button" id="clear-search-product-update-order">Clear Search</button>
            </div>

            <div class="product-found" id="product-found-update-order"></div>
            <label>Selected Items</label>
            <div class="product-added" id="added-product-update-order"></div>

            <label>Order Status</label>
            <select name="orderStatus" id="order-status-select-update-order" required>
                <option value="">Please choose an option</option>
                <option value="WAITING_PAYMENT">WAITING_PAYMENT</option>
                <option value="PAID">PAID</option>
                <option value="SHIPPED">SHIPPED</option>
                <option value="DELIVERED">DELIVERED</option>
                <option value="CANCELLED">CANCELLED</option>
            </select>

            <input type="submit" id="update-admin-order-button" class="large-blue-button" value="Update order">
        </form>
    </div>
</template>

<!-- Orders Delete -->
<template id="template-delete-order">
    <div class="form-background">
        <h1 class="form-title">Delete order</h1>
        <div class="alert"></div>
        <label>Do you really want to delete this order?</label>
        <button class="delete-option-button" id="delete-order">Delete</button>
    </div>
</template>

<!-- Orders Detail -->
<template id="template-order-detail">
    <div>
        <div class="form-title">Order Details</div>
        <div id="order-detail"></div>
    </div>
</template>

<!-- Template Product Detail -->
<template id="template-detail">
    <div class="detail-mode-img">
        <img id="product-img">
    </div>
    <div class="detail-mode-info">
        <label id="product-title" class="detail-mode-title"></label>
        <label id="product-price" class="detail-mode-price"></label>
        <label id="product-color"></label>
        <label id="product-description" class="detail-mode-description"></label>
        <label id="product-size"></label>
        <div class="detail-mode-quantity">
            <label class="detail-mode-description">Quantity:</label>
            <select id="product-quantity">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
            </select>
        </div>
        <button id="add-cart-button">Add to cart</button>
    </div>
</template>

<!-- 404 Error Page -->
<template id="template-error">
    <div>
        <h1>404 - Page not found!</h1>
        <p>Looks like this page doesn't exist.
        <p>
            <br>
            <a href="/">Back to home page</a>
    </div>
</template>

<!-- Shopping Cart Template -->
<template id="template-cart">
    <div>
        <label class="form-title">Shopping Cart</label>
    </div>
    <div id="cart-items"></div>
    <div id="cart-total"></div>
    <div class="cart-buttons">
        <button class="clear-cart-button" id="clear-cart-button">Clear Cart</button>
        <button id="checkout-button">Proceed to check out</button>
    </div>
</template>

<!-- Checkout Template -->
<template id="template-checkout">
    <div class="form-background">

            <div class="form-title">Getting your order</div>
            <div class="alert"></div>
            <button id="confirm-checkout" class="large-green-button">Confirm Payment</button>
            <button id="cancel-checkout" class="large-red-button">Cancel checkout</button>
        </div>
    </div>
    <div class="checkout-list">
        <div id="checkout-items"></div>
        <div id="checkout-total"></div>
    </div>
</template>

<!-- Orders Page (user purchases) -->
<template id="template-purchases">
    <div>
        <div class="form-title">Your purchases</div>
        <div id="user-purchases"></div>
    </div>
</template>

<!-- User Profile Page -->
<template id="template-profile">
    <div class="profile-menu">
        <button class="small-white-button" id="profile-settings">Account Settings</button>
        <button class="small-white-button" id="profile-password">Change your password</button>
        <button class="small-white-button" id="profile-logout">Logout</button>
    </div>
    <div class="profile-data" id="profile-option">
        <h1>Select an option</h1>
    </div>
</template>
